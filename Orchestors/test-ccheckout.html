<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stripe Checkout Test</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:700px;
    margin:40px auto;
}
.section{
    border:1px solid #ccc;
    padding:20px;
    margin-bottom:30px;
}
input{
    display:block;
    margin:10px 0;
    padding:8px;
    width:100%;
}
button{
    padding:10px 16px;
    cursor:pointer;
}
pre{
    background:#f4f4f4;
    padding:10px;
}
</style>

</head>

<body>

<h1>Backend Payment Test Console</h1>

<div class="section">

<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<pre id="loginResult"></pre>

</div>

<div class="section">

<h2>Test Payment</h2>

<button onclick="startPayment()">Buy Japan eSIM</button>

<pre id="paymentResult"></pre>

</div>

<script>
let checkoutAttemptId = null;

async function login(){

    const payload = {
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    try{

        const res = await fetch("http://127.0.0.1:7000/api/auth/login",{
            method:"POST",
            credentials:"include",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(payload)
        });

        const data = await res.json();

        document.getElementById("loginResult").textContent =
        JSON.stringify(data,null,2);

        alert("Login request sent. Cookie should now be stored.");

    }catch(err){

        console.error(err);

    }

}


async function startPayment(){
    if (!checkoutAttemptId) {
        checkoutAttemptId = crypto.randomUUID();
    }
    const buyBtn = document.querySelector('button[onclick="startPayment()"]');
    buyBtn.disabled = true;
    buyBtn.textContent = "Processing...";

    const payload = {
        plan_id:"eSIM-JP500M-01",
        destinationId:"JYN-1",
        countryCode:"IN",
        promocode:"NEW20",
        acceptTerms:1,
        productname:"japanESim",
        checkout_attempt_id: checkoutAttemptId
    };

    try{

        const res = await fetch("http://127.0.0.1:7000/api/init",{
            method:"POST",
            credentials:"include",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(payload)
        });

        const data = await res.json();

        document.getElementById("paymentResult").textContent =
        JSON.stringify(data,null,2);

        const checkoutUrl = data?.data?.checkoutUrl || data?.checkoutUrl;

        if(checkoutUrl){
            window.location.href = checkoutUrl;
        }

    }catch(err){

        console.error(err);

    }finally{
        buyBtn.disabled = false;
        buyBtn.textContent = "Buy Japan eSIM";
    }

}

</script>

</body>
</html>
