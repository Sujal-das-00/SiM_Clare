<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Stripe Checkout Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
        }

        .section {
            border: 1px solid #ccc;
            padding: 20px;
            margin-bottom: 30px;
        }

        input {
            display: block;
            margin: 10px 0;
            padding: 8px;
            width: 100%;
        }

        button {
            padding: 10px 16px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        pre {
            background: #f4f4f4;
            padding: 10px;
        }

        .hint {
            color: #555;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <h1>Backend Payment Test Console</h1>

    <div class="section">
        <h2>Login</h2>
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
        <pre id="loginResult"></pre>
    </div>

    <div class="section">
        <h2>Test Payment</h2>
        <p class="hint">
            The page now fetches a real plan for the selected sim type before calling checkout.
            It will prefer <code>TEST28</code> when that plan matches the selected type.
        </p>
        <button id="type1Btn" onclick="startPaymentFlow('type1')">Buy Type 1 eSIM</button>
        <button id="type2Btn" onclick="startPaymentFlow('type2')">Buy Type 2 eSIM</button>
        <button id="type3Btn" onclick="startPaymentFlow('type3')">Buy Type 3 eSIM</button>
        <pre id="paymentResult"></pre>
    </div>

    <script>
        let checkoutAttemptId = null;
        const FLOW_CONFIGS = {
            type1: {
                desiredType: 1,
                buttonId: "type1Btn",
                label: "Buy Type 1 eSIM",
                processingLabel: "Processing Type 1...",
                initPayload: {
                    destinationId: "AL-1",
                    countryCode: "IN",
                    acceptTerms: 1,
                    productname: "Type 1 eSIM"
                },
                customerRoute: "/api/post/customer/data",
                buildCustomerPayload(orderId) {
                    return {
                        order_id: orderId,
                        sim_type: 1,
                        product_code: "TEST28",
                        product_type: "1"
                    };
                },
                sampleProviderPayload: {
                    items: [
                        {
                            type: "1",
                            sku: "TEST28",
                            quantity: 1,
                            mobileno: "<from logged-in user>",
                            emailid: "<from logged-in user>"
                        }
                    ]
                }
            },
            type2: {
                desiredType: 2,
                buttonId: "type2Btn",
                label: "Buy Type 2 eSIM",
                processingLabel: "Processing Type 2...",
                initPayload: {
                    destinationId: "AL-1",
                    countryCode: "IN",
                    acceptTerms: 1,
                    productname: "Type 2 eSIM"
                },
                customerRoute: "/api/post/customer/data",
                buildCustomerPayload(orderId) {
                    return {
                        order_id: orderId,
                        sim_type: 2,
                        product_code: "TEST28",
                        product_type: "2"
                    };
                },
                sampleProviderPayload: {
                    items: [
                        {
                            type: "2",
                            sku: "TEST28",
                            quantity: 1,
                            emailid: "<from logged-in user>"
                        }
                    ]
                }
            },
            type3: {
                desiredType: 3,
                buttonId: "type3Btn",
                label: "Buy Type 3 eSIM",
                processingLabel: "Processing Type 3...",
                initPayload: {
                    destinationId: "AL-1",
                    countryCode: "IN",
                    acceptTerms: 1,
                    productname: "Type 3 eSIM"
                },
                customerRoute: "/api/post/customer/data/type3/queue",
                buildCustomerPayload(orderId) {
                    return {
                        order_id: orderId,
                        sim_type: 3,
                        destination_id: 9,
                        customer_name: "John",
                        customer_surname1: "Doe",
                        customer_surname2: "Smith",
                        customer_document_type_id: 1,
                        customer_document_number: "12345678A",
                        customer_birthdate: "1990-01-01",
                        customer_sex: "M",
                        customer_nationality_id: 1
                    };
                },
                sampleProviderPayload: {
                    items: [
                        {
                            type: "3",
                            sku: "TEST28",
                            quantity: 1,
                            productCode: "TEST28",
                            destinationId: "9",
                            customer_name: "John",
                            customer_surname1: "Doe",
                            customer_surname2: "Smith",
                            customer_document_type_id: 1,
                            customer_document_number: "12345678A",
                            customer_birthdate: "1990-01-01",
                            customer_sex: "M",
                            customer_nationality_id: 1,
                            emailid: "<from logged-in user>"
                        }
                    ]
                }
            }
        };
        const PREFERRED_PLAN_ID = "TEST28";
        const queryParams = new URLSearchParams(window.location.search);
        const apiBase = (
            queryParams.get("apiBase") ||
            localStorage.getItem("apiBase") ||
            "http://127.0.0.1:7000"
        ).replace(/\/$/, "");

        if (queryParams.get("apiBase")) {
            localStorage.setItem("apiBase", apiBase);
        }

        async function login() {
            const payload = {
                email: document.getElementById("email").value,
                password: document.getElementById("password").value
            };

            try {
                const res = await fetch(`${apiBase}/api/auth/login`, {
                    method: "POST",
                    credentials: "include",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                document.getElementById("loginResult").textContent =
                    JSON.stringify(data, null, 2);

                alert("Login request sent. Cookie should now be stored.");

            } catch (err) {
                console.error("Login error:", err);
            }
        }

        function setButtonsDisabled(disabled) {
            Object.values(FLOW_CONFIGS).forEach((config) => {
                const button = document.getElementById(config.buttonId);
                button.disabled = disabled;
                button.textContent = disabled ? config.processingLabel : config.label;
            });
        }

        async function fetchPlanForType(config) {
            const simsRes = await fetch(
                `${apiBase}/api/get/sims/${config.initPayload.destinationId}?countryCode=${encodeURIComponent(config.initPayload.countryCode)}`,
                {
                    method: "GET",
                    credentials: "include"
                }
            );

            if (!simsRes.ok) {
                throw new Error(`Failed to fetch plans for sim type ${config.desiredType}`);
            }

            const simsData = await simsRes.json();
            const plans = simsData?.data?.plans || [];
            const matchingPlans = plans.filter((plan) => Number(plan.type) === Number(config.desiredType));

            if (!matchingPlans.length) {
                throw new Error(`No plan found for sim type ${config.desiredType}`);
            }

            const preferredPlan =
                matchingPlans.find((plan) => String(plan.id) === PREFERRED_PLAN_ID) ||
                matchingPlans[0];

            return preferredPlan;
        }

        async function startPaymentFlow(flowKey) {
            const config = FLOW_CONFIGS[flowKey];
            if (!checkoutAttemptId) {
                checkoutAttemptId = crypto.randomUUID();
            }

            setButtonsDisabled(true);

            try {
                const selectedPlan = await fetchPlanForType(config);

                const payload = {
                    ...config.initPayload,
                    plan_id: selectedPlan.id,
                    checkout_attempt_id: checkoutAttemptId
                };

                const res = await fetch(`${apiBase}/api/init`, {
                    method: "POST",
                    credentials: "include",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    console.error("Init failed with status:", res.status);
                    document.getElementById("paymentResult").textContent =
                        `Init API failed with status: ${res.status}`;
                    return;
                }

                const data = await res.json();
                console.log("Init response data:", data);
                console.log(data.data.order_id);
                console.log(data.data.sim_type);

                const orderId = data.data.order_id ?? data.orderId;
                const actualSimType = Number(data.data.sim_type);
                const customerPayload = config.buildCustomerPayload(orderId);

                const customerRes = await fetch(`${apiBase}${config.customerRoute}`, {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(customerPayload)
                });

                if (!customerRes.ok) {
                    const errorBody = await customerRes.json();
                    console.error("Customer API failed:", customerRes.status, errorBody);
                    document.getElementById("paymentResult").textContent =
                        `Error ${customerRes.status}: ${JSON.stringify(errorBody, null, 2)}`;
                    return;
                }

                const customerData = await customerRes.json();
                document.getElementById("paymentResult").textContent =
                    JSON.stringify({
                        selected_flow: flowKey,
                        selected_plan_id: selectedPlan.id,
                        selected_plan_type: Number(selectedPlan.type),
                        expected_sim_type: Number(customerPayload.sim_type),
                        actual_sim_type_from_init: actualSimType,
                        init_response: data,
                        customer_api_route: config.customerRoute,
                        customer_api_payload: customerPayload,
                        customer_api_response: customerData,
                        sample_provider_payload: config.sampleProviderPayload
                    }, null, 2);

                const checkoutUrl = data?.data?.checkoutUrl || data?.checkoutUrl;
                if (checkoutUrl) {
                    window.location.href = checkoutUrl;
                }

            } catch (err) {
                console.error("Payment error:", err);
                document.getElementById("paymentResult").textContent =
                    `Error: ${err.message}`;
            } finally {
                setButtonsDisabled(false);
            }
        }
    </script>

</body>

</html>
